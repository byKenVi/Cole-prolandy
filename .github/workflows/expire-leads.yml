name: Expire stale leads

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expire:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Call protected expiry endpoint
        if: env.APP_URL != '' && env.CRON_SECRET != ''
        run: |
          curl --fail-with-body --retry 3 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${APP_URL%/}/api/cron/expire-leads"

      - name: Explain missing configuration
        if: env.APP_URL == '' || env.CRON_SECRET == ''
        run: echo "Skipped. Add APP_URL and CRON_SECRET as GitHub Actions repository secrets for non-Vercel hosting."
